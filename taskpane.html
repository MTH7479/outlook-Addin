<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>Save Contacts</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      direction: rtl;
    }

    h3 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      background: #0f6cbd;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #status {
      margin-top: 12px;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h3>Save Contacts</h3>

  <label for="projectNumber">מספר פרויקט</label>
  <input id="projectNumber" type="text" placeholder="לדוגמה: 2255" />

  <button id="sendTriggerButton">הפעל זרימה</button>

  <div id="status"></div>
</body>
</html>
